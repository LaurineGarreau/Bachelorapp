<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filum – Splash</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .phone {
      width: 375px;
      height: 812px;
      background: #6b6fe8;
      border-radius: 50px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px 0;
      height: 44px;
      position: relative;
      z-index: 10;
    }

    .status-time {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-icons svg {
      fill: #fff;
    }

    /* Decorative arcs */
    .arcs {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .arcs svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 900px;
      opacity: 0.18;
    }

    /* Main content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
      z-index: 2;
    }

    /* App icon */
    .app-icon {
      width: 120px;
      height: 120px;
      background: #fff;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
    }

    .app-icon svg {
      width: 64px;
      height: 64px;
    }

    .app-name {
      color: #fff;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .app-subtitle {
      color: rgba(255, 255, 255, 0.65);
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.1px;
    }

    /* Footer */
    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-bottom: 48px;
      position: relative;
      z-index: 2;
    }

    .tagline {
      color: rgba(255, 255, 255, 0.75);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    .dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 20px;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.35);
    }

    .dot.active {
      background: #fff;
    }

    /* Home indicator */
    .home-indicator {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .home-bar {
      width: 134px;
      height: 5px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="phone">

    <!-- Status bar -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <!-- Signal bars -->
        <svg width="17" height="12" viewBox="0 0 17 12">
          <rect x="0"  y="7" width="3" height="5" rx="0.5"/>
          <rect x="4"  y="5" width="3" height="7" rx="0.5"/>
          <rect x="8"  y="3" width="3" height="9" rx="0.5"/>
          <rect x="12" y="0" width="3" height="12" rx="0.5"/>
        </svg>
        <!-- WiFi -->
        <svg width="16" height="12" viewBox="0 0 16 12">
          <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/>
          <path d="M8 6.2a5.1 5.1 0 0 1 3.6 1.5l1.4-1.4A7.1 7.1 0 0 0 8 4a7.1 7.1 0 0 0-5 2.3l1.4 1.4A5.1 5.1 0 0 1 8 6.2z"/>
          <path d="M8 2.9a8.5 8.5 0 0 1 6 2.5L15.4 4A10.5 10.5 0 0 0 8 0.9a10.5 10.5 0 0 0-7.4 3.1L2 5.4A8.5 8.5 0 0 1 8 2.9z"/>
        </svg>
        <!-- Battery -->
        <svg width="25" height="12" viewBox="0 0 25 12">
          <rect x="0" y="1" width="21" height="10" rx="2.5" stroke="white" stroke-width="1" fill="none"/>
          <rect x="22" y="3.5" width="2" height="5" rx="1" fill="white" opacity="0.4"/>
          <rect x="1.5" y="2.5" width="17" height="7" rx="1.5" fill="white"/>
        </svg>
      </div>
    </div>

    <!-- Background arcs -->
    <div class="arcs">
      <svg viewBox="0 0 900 900" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="450" cy="450" r="120" stroke="white" stroke-width="1"/>
        <circle cx="450" cy="450" r="200" stroke="white" stroke-width="1"/>
        <circle cx="450" cy="450" r="290" stroke="white" stroke-width="1"/>
        <circle cx="450" cy="450" r="390" stroke="white" stroke-width="1"/>
        <circle cx="450" cy="450" r="500" stroke="white" stroke-width="1"/>
      </svg>
    </div>

    <!-- Center content -->
    <div class="content">
      <div class="app-icon">
        <!-- Stylized "ff" / cursive f logo -->
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Left f -->
          <path d="M14 44 C14 44 14 28 14 24 C14 18 18 13 24 13 C24 13 26 13 27 14"
                stroke="#6b6fe8" stroke-width="3" stroke-linecap="round" fill="none"/>
          <line x1="10" y1="30" x2="26" y2="30" stroke="#6b6fe8" stroke-width="3" stroke-linecap="round"/>
          <!-- Right f / descending curve -->
          <path d="M28 44 C28 44 28 28 28 24 C28 18 32 13 38 13 C38 13 40 13 41 14"
                stroke="#6b6fe8" stroke-width="3" stroke-linecap="round" fill="none"/>
          <path d="M28 50 C28 54 30 58 34 58 C36 58 38 57 39 55"
                stroke="#6b6fe8" stroke-width="3" stroke-linecap="round" fill="none"/>
          <line x1="24" y1="30" x2="40" y2="30" stroke="#6b6fe8" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>

      <h1 class="app-name">filum</h1>
      <p class="app-subtitle">Bienvenue sur Filum</p>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="tagline">Le savoir circule</span>
      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <!-- Home indicator -->
    <div class="home-indicator">
      <div class="home-bar"></div>
    </div>

  </div>
</body>
</html>
